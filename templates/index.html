<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Overwatch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; color: #e0e6f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px; }
        .logo { font-size: 48px; margin-bottom: 10px; }
        h1 { font-size: 32px; color: #f99e1a; margin-bottom: 8px; letter-spacing: 2px; }
        p { color: #8892a4; margin-bottom: 40px; font-size: 16px; }
        .stats { background: #141826; border: 1px solid #1e2a40; border-radius: 12px; padding: 20px 40px; margin-bottom: 40px; display: inline-block; }
        .stats span { font-size: 36px; font-weight: bold; color: #f99e1a; }
        .stats small { display: block; color: #8892a4; font-size: 13px; }
        .btn { display: inline-block; padding: 16px 40px; border-radius: 8px; font-size: 16px; font-weight: 600; text-decoration: none; margin: 8px; transition: all 0.2s; }
        .btn-primary { background: #f99e1a; color: #0a0e1a; }
        .btn-primary:hover { background: #ffb340; transform: translateY(-2px); }
        .btn-secondary { background: transparent; color: #f99e1a; border: 2px solid #f99e1a; }
        .btn-secondary:hover { background: #f99e1a22; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>TRACKER OVERWATCH</h1>
        <p>Analyse ton game sense. Progresse à chaque partie.</p>
        <div class="stats">
            <span>{{ total }}</span>
            <small>sessions enregistrées</small>
        </div>
        <br>
        <a href="/questions" class="btn btn-primary">+ Nouvelle session</a>
        <a href="/patterns" class="btn btn-secondary">📈 Mes patterns</a>
    </div>
</body>
</html>
